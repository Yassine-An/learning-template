<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="YSN">
    <meta name="keywords" content="login, authentication">
    <meta name="description" content="A simple login page ">
    <title>LearnHub</title>
    <link rel="stylesheet" href="./../assets/css/forget-passwd.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h2><i id="head-icon"  class="fa-solid fa-graduation-cap" ></i> <span style="color:#243d5c;"> Learn</span><span style="color: #ea6c0a;">Hub</span></h2>
        <span id="login">Pas de compte ? <a id="sign" href="login.html">Retour à la connexion &#8594;</a></span>
    </header>
    <div id="container">
        <span id="first-icon"><i class="fa-solid fa-envelope-open-text"></i></span>
        <h1>Mot de passe oublié ?</h1>
        <p>Pas de problème .Entrez l'e-mail lié à votre compte et <span style="margin-left: 30px;"> nous vous enverrons un lien pour réinitialiser</span><span style="margin-left: 30%;"> immédiatement .</span></p>
        <form action="forget-passwd.html" method="post">
            <label for="email">Adresse e-mail </label>
            <div style="position: relative;width: 100%;">
            <input type="email" name="email" id="email" placeholder=" vous@exemple.com" required>
            <span style="z-index: 2;color: var(--placeholder-color);position: absolute;left: 10px;top:9px" id="second-icon"><i class="fa-regular fa-envelope"></i></span>
            </div>
            <button type="submit">Envoyer un lien <i class="fa-solid fa-paper-plane"></i></button>
        </form>
        <a href="login.html" id="back-login">&#8592; Retour à la connexion</a>
        <div id="under">
            <p style="color: var(--footer-text-color);" class="fin"><i style="color: var(--nav-link-color);" class="fa-solid fa-lock"></i> AES 256 bits</p>
            <p style="color: var(--footer-text-color);" class="fin"><i style="color: var(--nav-link-color);" class="fa-solid fa-certificate"></i> Certifié SOC 2</p>
            <p style="color: var(--footer-text-color);" class="fin"><i style="color: var(--nav-link-color);" class="fa-solid fa-gavel"></i> Conforme RGPD</p>
        </div>
    </div>
</body>
</html>
