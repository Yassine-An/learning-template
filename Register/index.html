<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>
<body>
    <header>
        <div id="hero">
            <span><i class="fa-solid fa-bolt-lightning"></i></span>
            <h2>Aurora</h2>
        </div>
        <p>Vous en souvenez?<a href="./../TP4/index.html">Retour à la connexion &#8594;</a> </p>
    </header>
    <main>
        <div id="container">
            <span></span>
            <h1 class="center">Mot de passe oublié?</h1>
            <p class="center">Pas de pobléme.Entrez l'é-mail lié à votre compte et<br>nous vous enverrons un lien de réinitialisation<br>immédiatement.</p>
            <div id="input-box">
                <label>Adresse e-mail</label><br/>
                <span id="email"><i class="fa-regular fa-envelope"></i></span>
                <input type="email" placeholder="vous@entreprise.com"/>
            </div>
            <button>Envoyer le lien <i class="fa-solid fa-paper-plane"></i> </button>
            <div id="contraire">
                <a  href="./../TP4/index.html"><i class="fa-solid fa-arrow-left"></i>Retour à la connection</a>
            </div>
            <div id="info">
                <span><i class="fa-solid fa-lock" style="color:#4f46e5 ; margin-right: 2px;"> </i>AES 256 bits</span>
                <span><i class="fa-solid fa-certificate" style="color:#4f46e5"; margin-right: 2px;></i> Certifié SOC2</span>
                <span><i class="fa-solid fa-gavel" style="color:#4f46e5"; margin-right: 2px;></i> Conforme RGPD</span>
            </div>
        </div>
    </main>
</body>
</html>
